<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VMR — Login</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="login-page">
  <div class="login-bg-text">VMR</div>

  <div class="login-card slide-up">
    <div class="login-logo">
      <div class="login-logo-mark">VMR</div>
      <h1>VMR</h1>
      <p>Vehicle Maintenance Record</p>
    </div>

    <form class="login-form" id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" id="username" type="text"
          placeholder="Enter your username"
          autocomplete="username" autocapitalize="none"/>
        <span class="form-error hidden" id="username-err">Username is required.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-field">
          <input class="form-input" id="password" type="password"
            placeholder="Enter your password"
            autocomplete="current-password"/>
          <button type="button" class="password-toggle" id="togglePwd">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="form-error hidden" id="password-err">Password is required.</span>
      </div>

      <button type="submit" class="login-submit" id="loginBtn">LOGIN</button>
      <div class="login-footer">© 2024 VMR · Vehicle Maintenance Record</div>
    </form>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script src="api.js"></script>
<script>
  /* Already logged in → skip to dashboard */
  if (VMR_API.isLoggedIn()) window.location.href = 'homepage.html';

  /* Password toggle */
  document.getElementById('togglePwd').addEventListener('click', function () {
    const inp = document.getElementById('password');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    this.innerHTML = show
      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  });

  let toastTimer;
  function showToast(msg, type = 'error') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast toast-' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.add('hidden'), 3500);
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    document.getElementById('username-err').classList.toggle('hidden', !!u);
    document.getElementById('password-err').classList.toggle('hidden', !!p);
    if (!u || !p) return;

    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Logging in…';
    btn.disabled = true;

    try {
      await VMR_API.login(u, p);
      showToast('Login successful! Redirecting…', 'success');
      setTimeout(() => { window.location.href = 'homepage.html'; }, 700);
    } catch (err) {
      showToast(err.message || 'Invalid username or password.', 'error');
      btn.textContent = 'LOGIN';
      btn.disabled = false;
    }
  });

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
  });
</script>
</body>
</html>
